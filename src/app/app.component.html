<ion-app>
  <div
    class="app-layout"
    [class.auth-layout]="!showMenu"
    [class.sidebar-closed]="sidebarClosed && showMenu"
  >
    <aside class="sidebar" *ngIf="showMenu">
      <button class="sidebar-toggle" (click)="toggleSidebar()" title="Ocultar menú">
        <ion-icon name="chevron-back-outline"></ion-icon>
      </button>

      <div class="sidebar-brand">
        <div class="logo-wrap">
          <img src="assets/logo-tekies.png" alt="TeKiesTeK ERP" />
        </div>

        <div class="brand-text">
          <p>TeKiesTeK</p>
          <h2>Solutions</h2>
        </div>
      </div>

      <nav class="menu-list">
        <a
          *ngFor="let item of menuItems"
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
          class="menu-link"
          [class.hidden]="!canShowItem(item)"
        >
          <ion-icon [name]="item.icon"></ion-icon>
          <span>{{ item.title }}</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-card">
          <div class="avatar">
            {{ profile?.nombre?.charAt(0) || 'U' }}
          </div>

          <div class="user-info">
            <strong>{{ profile?.nombre || 'Usuario' }}</strong>
            <span>{{ getRoleLabel() }}</span>
          </div>
        </div>

        <button class="logout-btn" (click)="logout()">
          <ion-icon name="log-out-outline"></ion-icon>
          <span>Cerrar sesión</span>
        </button>
      </div>
    </aside>

    <main class="app-main">
      <button class="floating-menu-btn" *ngIf="showMenu" (click)="toggleSidebar()" title="Mostrar menú">
        <ion-icon name="menu-outline"></ion-icon>
      </button>

      <router-outlet></router-outlet>
    </main>
  </div>
</ion-app>
